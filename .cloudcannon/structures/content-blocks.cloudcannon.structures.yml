# CloudCannon Structures — Phase 4 emissions.
# Phase 6 wires this in via `cloudcannon.config.yml`'s split-config `*_from_glob` pattern.
#
# Field-completeness rule: every field that any block instance might use is present
# in the structure's `value` object with a sensible default. Missing fields = CC can't
# round-trip-edit existing blocks.

_structures:
  content_blocks:
    style: modal
    values:

      - label: Hero — Headline + ZIP locator
        icon: star
        tags: [Hero, Above-the-fold]
        value:
          _type: hero_block
          eyebrow_rating: "from 12,400+ verified owners"
          heading: "Bring the room you love"
          heading_em: "back to life."
          lede: "Save up to $650 when you upgrade your old wood-burning fireplace to a beautiful, easy-to-use Heat & Glo gas insert."
          cta_primary_text: "Get Your $650 Savings Code"
          cta_primary_href: "/promotions/gas-insert-rebate/"
          cta_primary_variant: "orange"
          cta_secondary_text: "Browse the Lineup"
          cta_secondary_href: "/products/"
          cta_secondary_variant: "ghost"
          microcopy: "✓ No purchase necessary · ✓ 0% financing through dealer partners · ✓ Most installs in 2-4 weeks"
          zip_label: "Find a Dealer"
          zip_placeholder: "ZIP code"
          zip_button_text: "Search →"
          zip_action: "/where-to-buy/"
          proximity_text: ""
          background_image: "https://hearthnhome.getbynder.com/transform/938c4268-c58b-4e89-be57-3740ffd4bbd9/Heat-Glo-SupremeX-Living-Room-1?io=transform:fill,width:1920,height:1080"
          background_image_alt: ""
          bg_variant: "paper"
          alignment: "left"
          density: "default"
          hidden_on_mobile: false
        preview:   { text: "{heading}", subtext: "{cta_primary_text}", icon: star }
        picker_preview: { text: "Hero — Headline + ZIP locator", subtext: "Above-the-fold cinematic CTA", icon: star }

      - label: Heritage Trust Strip
        icon: shield
        tags: [Trust, Heritage]
        value:
          _type: trust_strip_block
          items:
            - { icon: "★",  num: "50",     num_unit: "yrs", label: "Engineered since 1975" }
            - { icon: "🏠", num: "2.4M",   num_unit: "+",   label: "Hearths installed" }
            - { icon: "📍", num: "1,400",  num_unit: "+",   label: "Authorized dealers" }
            - { icon: "🇺🇸", num: "USA",   num_unit: "",    label: "Made in Lake City, MN" }
          bg_variant: "cream"
          alignment: "left"
          density: "compact"
          hidden_on_mobile: false
        preview:   { text: "Heritage Trust Strip", subtext: "{items.0.label}", icon: shield }
        picker_preview: { text: "Heritage Trust Strip", subtext: "Four-cell heritage row", icon: shield }

      - label: Love Your Fireplace Again
        icon: heart
        tags: [Feature, Promo]
        value:
          _type: love_your_fireplace_block
          eyebrow: "Limited Offer · Through May 1"
          heading: "Love Your Fireplace"
          heading_em: "Again"
          paragraph_1: ""
          paragraph_2: ""
          cta_text: "Get Your Savings Code"
          cta_href: "/promotions/gas-insert-rebate/"
          cta_variant: "ink"
          media_image: ""
          media_image_alt: ""
          media_position: "right"
          bg_variant: "paper"
          alignment: "left"
          density: "default"
          hidden_on_mobile: false
        preview:   { text: "{heading} {heading_em}", subtext: "{cta_text}", icon: heart }
        picker_preview: { text: "Love Your Fireplace Again", subtext: "Image + copy split with rebate CTA", icon: heart }

      - label: Browse the Lineup — 4 product types
        icon: grid
        tags: [Products, Browse]
        value:
          _type: browse_lineup_block
          eyebrow: "Browse the Lineup"
          heading: "Four ways a Heat & Glo fits a room."
          lede: "Gas, electric, wood, and outdoor — every Heat & Glo fireplace is engineered for the way American homes actually live."
          cards:
            - { image: "", image_alt: "", title: "Gas Fireplaces",      sub: "Direct-vent, B-vent, ventless · 18 models", cta_text: "Browse Gas",      cta_href: "/products/gas-fireplaces/" }
            - { image: "", image_alt: "", title: "Electric Fireplaces", sub: "Wall-mount, built-in, inserts · 9 models", cta_text: "Browse Electric", cta_href: "/products/electric-fireplaces/" }
            - { image: "", image_alt: "", title: "Wood Fireplaces",     sub: "EPA-certified, low-emission · 7 models",   cta_text: "Browse Wood",     cta_href: "/products/wood-fireplaces/" }
            - { image: "", image_alt: "", title: "Outdoor Fireplaces",  sub: "Patio, built-in, gas + wood · 11 models",  cta_text: "Browse Outdoor",  cta_href: "/products/outdoor-fireplaces/" }
          bg_variant: "paper"
          alignment: "center"
          density: "default"
          hidden_on_mobile: false
        preview:   { text: "{heading}", subtext: "Browse the Lineup", icon: grid }
        picker_preview: { text: "Browse the Lineup", subtext: "4-card product taxonomy grid", icon: grid }

      - label: ProAdvantage Trade Strip
        icon: tool
        tags: [Pro, Trade]
        value:
          _type: proadvantage_block
          eyebrow: "For Builders & Designers"
          heading: "Build Smarter With The"
          heading_em: "ProAdvantage Trade Program"
          paragraph_1: ""
          paragraph_2: ""
          cta_text: "Join Today"
          cta_href: "/pro/proadvantage/"
          cta_variant: "ink"
          media_image: ""
          media_image_alt: ""
          bg_variant: "cream"
          alignment: "left"
          density: "default"
          hidden_on_mobile: false
        preview:   { text: "ProAdvantage Trade Strip", subtext: "{cta_text}", icon: tool }
        picker_preview: { text: "ProAdvantage Trade Strip", subtext: "Trade audience: BIM, AIA credits, wholesale", icon: tool }

      - label: Six TV Wall Designs Editorial
        icon: tv
        tags: [Inspiration, Editorial]
        value:
          _type: tv_walls_block
          eyebrow: "Editorial · 8 min read"
          heading: "Six Fireplace + TV Wall Designs That"
          heading_em: "Get It Right"
          paragraph_1: ""
          cta_text: "Get Inspired"
          cta_href: "/inspiration/six-tv-wall-designs/"
          cta_variant: "ink"
          media_image: ""
          media_image_alt: ""
          bg_variant: "paper"
          alignment: "left"
          density: "default"
          hidden_on_mobile: false
        preview:   { text: "{heading} {heading_em}", subtext: "{cta_text}", icon: tv }
        picker_preview: { text: "Six TV Wall Designs Editorial", subtext: "Editorial tease with image", icon: tv }

      - label: As Featured In
        icon: award
        tags: [Press, Trust]
        value:
          _type: press_strip_block
          lead_text: "As featured in"
          logos:
            - { name: "Architectural Digest", emphasis: "regular" }
            - { name: "Dwell",                emphasis: "regular" }
            - { name: "House Beautiful",      emphasis: "regular" }
            - { name: "Fine Homebuilding",    emphasis: "bold" }
            - { name: "Builder",              emphasis: "bold" }
            - { name: "Houzz · Best of",      emphasis: "regular" }
          bg_variant: "cream"
          alignment: "center"
          density: "compact"
          hidden_on_mobile: false
        preview:   { text: "As Featured In", subtext: "{logos.length} publications", icon: award }
        picker_preview: { text: "As Featured In", subtext: "Press logo row", icon: award }

      - label: Common Questions FAQ
        icon: help-circle
        tags: [FAQ, Support]
        value:
          _type: faq_block
          eyebrow: "Common Questions"
          heading: "Everything you'd ask"
          heading_em: "at the showroom."
          items:
            - { question: "What's the difference between gas, electric, and wood fireplaces?", answer: "" }
            - { question: "How long does a typical install take?",                              answer: "" }
            - { question: "What happens at the free in-home consultation?",                     answer: "" }
            - { question: "Is financing available?",                                            answer: "" }
            - { question: "Will my existing wood-burning fireplace work with a gas insert?",    answer: "" }
            - { question: "Are Heat & Glo fireplaces ENERGY STAR certified?",                   answer: "" }
          bg_variant: "paper"
          alignment: "center"
          density: "default"
          hidden_on_mobile: false
        preview:   { text: "{heading} {heading_em}", subtext: "{items.length} questions", icon: help-circle }
        picker_preview: { text: "Common Questions", subtext: "Native-details accordion", icon: help-circle }

      - label: Owner Quote
        icon: quote
        tags: [Testimonial, Trust]
        value:
          _type: quote_block
          stars: 5
          quote_body: ""
          attribution_name: ""
          attribution_meta: ""
          bg_variant: "cream"
          alignment: "center"
          density: "default"
          hidden_on_mobile: false
        preview:   { text: "{attribution_name}", subtext: "{quote_body|truncate:60}", icon: quote }
        picker_preview: { text: "Owner Quote", subtext: "Single-quote testimonial pull", icon: quote }
